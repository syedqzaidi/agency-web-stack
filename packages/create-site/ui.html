<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency Web Stack - Project Creator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #09090b; color: #fafafa; line-height: 1.6; padding: 0;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 0 24px 80px; }

  /* -- Header -- */
  header { text-align: center; padding: 3rem 0 2rem; }
  header h1 { font-size: 1.75rem; font-weight: 700; color: #fafafa; letter-spacing: -0.02em; }
  header p { color: #71717a; margin-top: 0.5rem; font-size: 0.95rem; }
  header::after {
    content: ''; display: block; width: 80px; height: 2px;
    background: linear-gradient(to right, #2563eb, #3b82f6);
    margin: 1.5rem auto 0; border-radius: 1px;
  }

  /* -- Cards -- */
  .card {
    background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem;
    padding: 1.5rem; margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: #a1a1aa; margin-bottom: 1rem;
  }

  .card-label { display: block; color: #a1a1aa; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.5rem; }

  /* -- Buttons -- */
  .btn-primary {
    background: #2563eb; color: white; padding: 0.75rem 1.5rem; border-radius: 0.375rem;
    font-weight: 600; border: none; cursor: pointer; transition: background 150ms ease;
    width: 100%; font-size: 1rem; font-family: inherit;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-outline {
    background: transparent; color: #e4e4e7; border: 1px solid #3f3f46;
    padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500;
    cursor: pointer; transition: all 150ms ease; font-family: inherit; font-size: 0.85rem;
  }
  .btn-outline:hover { background: #27272a; border-color: #52525b; }
  .btn-outline.active { background: #172554; border-color: #2563eb; color: #93c5fd; }

  .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8rem; }

  .btn-start { border-color: #166534; color: #4ade80; }
  .btn-start:hover { background: #052e16; }
  .btn-stop { border-color: #7f1d1d; color: #f87171; }
  .btn-stop:hover { background: #450a0a; }

  /* -- Quick Locations -- */
  .quick-locations { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }

  /* -- Folder Browser -- */
  .folder-browser {
    background: #09090b; border: 1px solid #27272a; border-radius: 0.5rem; overflow: hidden;
  }
  .folder-path {
    display: flex; align-items: center; gap: 6px; padding: 0.625rem 0.875rem;
    background: #18181b; border-bottom: 1px solid #27272a; font-size: 0.8rem;
    color: #71717a; overflow-x: auto; white-space: nowrap;
  }
  .folder-path span { color: #60a5fa; cursor: pointer; }
  .folder-path span:hover { text-decoration: underline; }
  .folder-list { max-height: 260px; overflow-y: auto; }
  .folder-item {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.875rem;
    cursor: pointer; font-size: 0.875rem; color: #d4d4d8;
    border-bottom: 1px solid #1a1a1e; transition: background 100ms ease;
  }
  .folder-item:hover { background: #1f1f23; }
  .folder-icon { color: #f59e0b; font-size: 1rem; }
  .folder-select-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.625rem 0.875rem; background: #18181b; border-top: 1px solid #27272a;
  }
  .selected-path { font-size: 0.85rem; color: #71717a; }

  /* -- Input -- */
  input[type="text"] {
    width: 100%; padding: 0.625rem 0.875rem; background: #09090b;
    border: 1px solid #27272a; border-radius: 0.375rem; color: #fafafa;
    font-size: 0.875rem; font-family: inherit; outline: none;
    transition: border-color 150ms ease;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  input[type="text"]::placeholder { color: #52525b; }

  .slug-preview { font-size: 0.8rem; color: #71717a; margin-top: 0.375rem; }

  /* -- Preset Grid -- */
  .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; margin-bottom: 1.25rem; }
  .preset-card {
    background: #18181b; border: 1px solid #27272a; border-radius: 0.5rem;
    padding: 1rem; cursor: pointer; transition: all 150ms ease;
  }
  .preset-card:hover { border-color: #3f3f46; background: #1f1f23; }
  .preset-card.active { border-color: #2563eb; background: #172554; }
  .preset-card .name { font-weight: 600; font-size: 0.875rem; color: #fafafa; }
  .preset-card .desc { font-size: 0.75rem; color: #71717a; margin-top: 0.25rem; line-height: 1.4; }

  /* -- Services Grid -- */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.5rem; }
  .service-check {
    display: flex; align-items: flex-start; gap: 0.625rem; padding: 0.75rem;
    border: 1px solid #27272a; border-radius: 0.375rem; cursor: pointer;
    transition: all 150ms ease; background: transparent;
  }
  .service-check:hover { border-color: #3f3f46; }
  .service-check.active { border-color: #2563eb; background: #172554; }
  .service-check input { display: none; }
  .service-check .label { font-size: 0.85rem; color: #d4d4d8; }

  /* -- Terminal -- */
  .terminal {
    background: #09090b; border: 1px solid #27272a; border-radius: 0.5rem;
    padding: 1rem; font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
    font-size: 0.8rem; color: #a1a1aa; max-height: 300px; overflow-y: auto;
    line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    display: none; margin-top: 1rem;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  .terminal.visible { display: block; }

  /* -- Banners -- */
  .error-banner {
    background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5;
    padding: 0.75rem 1rem; border-radius: 0.375rem; font-size: 0.875rem;
    margin-top: 0.75rem; display: none;
  }
  .error-banner.visible { display: block; }
  .success-banner {
    background: #052e16; border: 1px solid #166534; color: #86efac;
    padding: 0.75rem 1rem; border-radius: 0.375rem; font-size: 0.875rem;
    margin-top: 0.75rem; display: none;
  }
  .success-banner.visible { display: block; }

  /* -- Server Panel -- */
  .server-panel {
    display: none; background: #18181b; border: 1px solid #27272a;
    border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .server-panel.visible { display: block; }

  .server-row {
    display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0;
    border-bottom: 1px solid #27272a;
  }
  .server-row:last-child { border-bottom: none; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #3f3f46; flex-shrink: 0; }
  .status-dot.starting { background: #eab308; }
  .status-dot.running { background: #22c55e; }
  .server-name { font-weight: 600; font-size: 0.875rem; min-width: 80px; color: #fafafa; }
  .server-url a { color: #60a5fa; text-decoration: none; font-size: 0.85rem; }
  .server-url a:hover { text-decoration: underline; }
  .server-actions { margin-left: auto; display: flex; gap: 0.5rem; }

  .server-logs {
    margin-top: 1rem; font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
    font-size: 0.75rem; background: #09090b; border: 1px solid #27272a;
    border-radius: 0.5rem; padding: 0.75rem; max-height: 180px; overflow-y: auto;
    color: #71717a; white-space: pre-wrap; word-break: break-all; display: none;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }
  .server-logs.visible { display: block; }

  /* -- URL Table -- */
  .url-table { width: 100%; border-collapse: collapse; }
  .url-table th {
    text-align: left; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.05em; color: #71717a; padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #27272a; font-weight: 600;
  }
  .url-table td {
    padding: 0.625rem 0.75rem; border-bottom: 1px solid #1a1a1e;
    font-size: 0.875rem; color: #d4d4d8;
  }
  .url-table a { color: #60a5fa; text-decoration: none; }
  .url-table a:hover { text-decoration: underline; }

  /* -- Footer -- */
  footer { text-align: center; padding: 2rem 0; border-top: 1px solid #27272a; margin-top: 1rem; }
  footer a { color: #71717a; text-decoration: none; font-size: 0.8rem; transition: color 150ms ease; }
  footer a:hover { color: #a1a1aa; }

  /* -- Scrollbar -- */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

  /* -- Responsive -- */
  @media (max-width: 480px) {
    .container { padding: 0 16px 60px; }
    header { padding: 2rem 0 1.5rem; }
    header h1 { font-size: 1.5rem; }
    .card { padding: 1.25rem; }
    .preset-grid { grid-template-columns: 1fr; }
    .services-grid { grid-template-columns: 1fr 1fr; }
    .server-row { flex-wrap: wrap; }
    .server-actions { margin-left: 0; width: 100%; margin-top: 0.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Agency Web Stack</h1>
    <p>Create a new project with your preferred stack and services.</p>
  </header>

  <!-- 1. Choose Location -->
  <div class="card">
    <div class="section-title">1. Choose Location</div>
    <div class="quick-locations" id="quickLocations"></div>
    <div class="folder-browser">
      <div class="folder-path" id="folderPath"></div>
      <div class="folder-list" id="folderList"></div>
      <div class="folder-select-bar">
        <span class="selected-path" id="selectedDisplay">No folder selected</span>
        <button class="btn-outline btn-sm" id="selectFolderBtn" onclick="selectCurrentFolder()">Select This Folder</button>
      </div>
    </div>
  </div>

  <!-- 2. Project Name -->
  <div class="card">
    <div class="section-title">2. Project Name</div>
    <input type="text" id="projectNameInput" placeholder="my-awesome-site" oninput="updateSlug()">
    <div class="slug-preview" id="slugPreview"></div>
  </div>

  <!-- 3. Stack & Services -->
  <div class="card">
    <div class="section-title">3. Stack &amp; Services</div>
    <span class="card-label">Presets</span>
    <div class="preset-grid" id="presetGrid"></div>
    <span class="card-label">Or pick individual services</span>
    <div class="services-grid" id="servicesGrid"></div>
  </div>

  <!-- Create Project -->
  <div class="card">
    <button class="btn-primary" id="createBtn" onclick="createProject()" disabled>Create Project</button>
    <div class="error-banner" id="errorBanner"></div>
    <div class="success-banner" id="successBanner"></div>
    <div class="terminal" id="terminal"></div>
  </div>

  <!-- Dev Servers -->
  <div class="server-panel" id="serverPanel">
    <div class="section-title">Dev Servers</div>
    <div id="serverRows"></div>
    <div class="server-logs" id="serverLogs"></div>
  </div>

  <!-- Service URLs -->
  <div class="server-panel" id="urlPanel">
    <div class="section-title">Service URLs</div>
    <table class="url-table">
      <thead><tr><th>Service</th><th>URL</th><th>Status</th></tr></thead>
      <tbody id="urlTableBody"></tbody>
    </table>
  </div>

  <footer>
    <a href="https://github.com" target="_blank">GitHub</a>
  </footer>
</div>

<script>
(function() {
  // -- State --
  var currentPath = '';
  var selectedPath = '';
  var projectName = '';
  var selectedPreset = null;
  var selectedServices = new Set();
  var projectPath = '';
  var creating = false;
  var serverStates = {};

  var presets = [
    { id: 'full', name: 'Full Stack', desc: 'Everything included — all 14 tools' },
    { id: 'marketing', name: 'Marketing Site', desc: 'Astro + Supabase + Sentry + PostHog' },
    { id: 'dashboard', name: 'Dashboard / App', desc: 'Next.js + Payload CMS + Supabase + Sentry' },
    { id: 'both-frameworks', name: 'Both Frameworks', desc: 'Astro + Next.js + Supabase + Sentry' },
    { id: 'minimal', name: 'Minimal (Astro)', desc: 'Astro only — Tailwind + shadcn, no backend' },
    { id: 'nextjs-minimal', name: 'Minimal (Next.js)', desc: 'Next.js only — Tailwind + shadcn, no backend' },
  ];

  var services = [
    { id: 'astro', name: 'Astro', desc: 'SEO and marketing websites', group: 'Frameworks' },
    { id: 'nextjs', name: 'Next.js', desc: 'Dashboards, apps, admin panels', group: 'Frameworks' },
    { id: 'supabase', name: 'Supabase', desc: 'Database + Auth + Storage', group: 'Backend' },
    { id: 'payload', name: 'Payload CMS', desc: 'Headless CMS (requires Next.js + Supabase)', group: 'Backend' },
    { id: 'twenty', name: 'Twenty CRM', desc: 'Customer relationship manager (Docker)', group: 'Backend' },
    { id: 'sentry', name: 'Sentry', desc: 'Error tracking', group: 'Integrations' },
    { id: 'posthog', name: 'PostHog', desc: 'Product analytics', group: 'Integrations' },
    { id: 'resend', name: 'Resend', desc: 'Transactional email', group: 'Integrations' },
  ];

  var defaultServiceURLs = [
    { name: 'Astro Website', service: 'astro', server: 'astro', portKey: 'ASTRO', suffix: '' },
    { name: 'Next.js App', service: 'nextjs', server: 'next', portKey: 'NEXTJS', suffix: '' },
    { name: 'Payload CMS Admin', service: 'payload', server: 'next', portKey: 'NEXTJS', suffix: '/admin' },
    { name: 'Supabase Studio', service: 'supabase', server: null, portKey: 'SUPABASE_STUDIO', suffix: '' },
    { name: 'Supabase Mailpit', service: 'supabase', server: null, portKey: 'SUPABASE_MAILPIT', suffix: '' },
    { name: 'Twenty CRM', service: 'twenty', server: null, portKey: 'TWENTY', suffix: '' },
  ];

  // Ports read from the project's .ports file after creation
  var projectPorts = {};

  // -- Helpers --
  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escAttr(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
  function $(id) { return document.getElementById(id); }

  // -- Init --
  async function init() {
    renderPresets();
    renderServices();
    var res = await fetch('/api/home');
    var data = await res.json();
    currentPath = data.home;
    renderQuickLocations(data.locations);
    loadFolders(currentPath);
    connectSSE();
  }

  // -- SSE --
  function connectSSE() {
    var evtSource = new EventSource('/api/logs');
    evtSource.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      switch (msg.type) {
        case 'log': appendTerminal(msg.data); break;
        case 'status': appendTerminal('--- ' + msg.data + ' ---\n'); break;
        case 'done': onProjectDone(msg.data); break;
        case 'server-log': appendServerLog(msg.data.server, msg.data.text); break;
        case 'server-ready': onServerReady(msg.data.server, msg.data.port); break;
        case 'server-stopped': onServerStopped(msg.data.server); break;
      }
    };
  }

  // -- Folder Browser --
  // Attach click listeners ONCE on containers (event delegation)
  // This prevents stacking duplicate listeners on every re-render.
  $('quickLocations').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-path]');
    if (btn) loadFolders(btn.getAttribute('data-path'));
  });
  $('folderPath').addEventListener('click', function(e) {
    var span = e.target.closest('[data-nav]');
    if (span) loadFolders(span.getAttribute('data-nav'));
  });
  $('folderList').addEventListener('click', function(e) {
    var item = e.target.closest('[data-nav]');
    if (item) loadFolders(item.getAttribute('data-nav'));
  });

  function renderQuickLocations(locations) {
    var el = $('quickLocations');
    el.textContent = '';
    for (var i = 0; i < locations.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'btn-outline btn-sm';
      btn.setAttribute('data-path', locations[i].path);
      btn.textContent = locations[i].name;
      el.appendChild(btn);
    }
  }

  window.loadFolders = async function(dirPath) {
    currentPath = dirPath;
    try {
      var res = await fetch('/api/folders?path=' + encodeURIComponent(dirPath));
      var data = await res.json();
      if (data.error) return;
      renderBreadcrumbs(data.current);
      renderFolderList(data);
    } catch(e) {}
  };

  function renderBreadcrumbs(p) {
    var el = $('folderPath');
    el.textContent = '';
    var parts = p.split('/').filter(Boolean);
    var rootSpan = document.createElement('span');
    rootSpan.setAttribute('data-nav', '/');
    rootSpan.textContent = '/';
    el.appendChild(rootSpan);
    var acc = '';
    for (var i = 0; i < parts.length; i++) {
      acc += '/' + parts[i];
      el.appendChild(document.createTextNode(' '));
      var span = document.createElement('span');
      span.setAttribute('data-nav', acc);
      span.textContent = parts[i];
      el.appendChild(span);
      el.appendChild(document.createTextNode(' /'));
    }
  }

  function renderFolderList(data) {
    var el = $('folderList');
    el.textContent = '';
    if (data.current !== data.parent) {
      var upItem = document.createElement('div');
      upItem.className = 'folder-item';
      upItem.setAttribute('data-nav', data.parent);
      upItem.textContent = '.. (up)';
      el.appendChild(upItem);
    }
    for (var i = 0; i < data.folders.length; i++) {
      var f = data.folders[i];
      var item = document.createElement('div');
      item.className = 'folder-item';
      item.setAttribute('data-nav', f.path);
      var icon = document.createElement('span');
      icon.className = 'folder-icon';
      icon.textContent = '\uD83D\uDCC1';
      var name = document.createElement('span');
      name.textContent = f.name;
      item.appendChild(icon);
      item.appendChild(name);
      el.appendChild(item);
    }
    if (!data.folders.length && data.current === data.parent) {
      var empty = document.createElement('div');
      empty.style.cssText = 'padding:14px;color:#52525b;font-size:0.85rem;';
      empty.textContent = 'No subfolders';
      el.appendChild(empty);
    }
  }

  window.selectCurrentFolder = function() {
    selectedPath = currentPath;
    $('selectedDisplay').textContent = selectedPath;
    $('selectFolderBtn').classList.add('active');
    validateForm();
  };

  // -- Project Name --
  window.updateSlug = function() {
    var raw = $('projectNameInput').value;
    projectName = raw.toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    $('slugPreview').textContent = projectName ? 'Folder: ' + projectName : '';
    validateForm();
  };

  // -- Presets (attach click listener ONCE) --
  $('presetGrid').addEventListener('click', function(e) {
    var card = e.target.closest('[data-preset]');
    if (card) togglePreset(card.getAttribute('data-preset'));
  });

  function renderPresets() {
    var el = $('presetGrid');
    el.textContent = '';
    for (var i = 0; i < presets.length; i++) {
      var p = presets[i];
      var card = document.createElement('div');
      card.className = 'preset-card';
      card.setAttribute('data-preset', p.id);
      card.id = 'preset-' + p.id;
      var name = document.createElement('div');
      name.className = 'name';
      name.textContent = p.name;
      var desc = document.createElement('div');
      desc.className = 'desc';
      desc.textContent = p.desc;
      card.appendChild(name);
      card.appendChild(desc);
      el.appendChild(card);
    }
  }

  function togglePreset(id) {
    if (selectedPreset === id) { selectedPreset = null; }
    else { selectedPreset = id; selectedServices.clear(); renderServices(); }
    var cards = document.querySelectorAll('.preset-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('active');
    if (selectedPreset) $('preset-' + id).classList.add('active');
    validateForm();
  }

  // -- Services (attach click listener ONCE) --
  $('servicesGrid').addEventListener('click', function(e) {
    var item = e.target.closest('[data-service]');
    if (item) toggleService(item.getAttribute('data-service'));
  });

  function renderServices() {
    var el = $('servicesGrid');
    el.textContent = '';
    var lastGroup = '';
    for (var i = 0; i < services.length; i++) {
      var s = services[i];
      // Add group header
      if (s.group && s.group !== lastGroup) {
        lastGroup = s.group;
        var groupLabel = document.createElement('div');
        groupLabel.style.cssText = 'font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:#52525b;padding:10px 0 4px 0;grid-column:1/-1;';
        if (i > 0) groupLabel.style.marginTop = '8px';
        groupLabel.textContent = s.group;
        el.appendChild(groupLabel);
      }
      var checked = selectedServices.has(s.id);
      var div = document.createElement('div');
      div.className = 'service-check' + (checked ? ' active' : '');
      div.setAttribute('data-service', s.id);
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = checked;
      var label = document.createElement('span');
      label.className = 'label';
      label.textContent = s.name;
      div.appendChild(cb);
      div.appendChild(label);
      if (s.desc) {
        var desc = document.createElement('div');
        desc.style.cssText = 'font-size:0.72rem;color:#52525b;margin-top:2px;grid-column:1/-1;padding-left:22px;';
        desc.textContent = s.desc;
        div.appendChild(desc);
      }
      el.appendChild(div);
    }
  }

  function toggleService(id) {
    if (selectedServices.has(id)) {
      selectedServices.delete(id);
      // If unchecking nextjs or supabase, also uncheck payload
      if ((id === 'nextjs' || id === 'supabase') && selectedServices.has('payload')) {
        selectedServices.delete('payload');
      }
    } else {
      selectedServices.add(id);
      // Payload requires nextjs + supabase
      if (id === 'payload') {
        selectedServices.add('nextjs');
        selectedServices.add('supabase');
      }
    }
    // Clear preset selection when manually toggling
    selectedPreset = null;
    var cards = document.querySelectorAll('.preset-card');
    for (var i = 0; i < cards.length; i++) cards[i].classList.remove('active');
    renderServices();
    validateForm();
  }

  // -- Form Validation --
  function validateForm() {
    var valid = selectedPath && projectName && (selectedPreset || selectedServices.size > 0);
    $('createBtn').disabled = !valid || creating;
  }

  // -- Create Project --
  window.createProject = async function() {
    if (creating) return;
    creating = true;
    var btn = $('createBtn');
    btn.textContent = 'Creating...';
    btn.disabled = true;
    $('terminal').classList.add('visible');
    $('terminal').textContent = '';
    $('errorBanner').classList.remove('visible');
    $('successBanner').classList.remove('visible');
    try {
      var res = await fetch('/api/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          projectName: projectName,
          location: selectedPath,
          services: Array.from(selectedServices),
          preset: selectedPreset,
        }),
      });
      var data = await res.json();
      if (data.error) {
        showError(data.error);
        creating = false;
        btn.textContent = 'Create Project';
        validateForm();
      } else {
        projectPath = data.projectPath;
      }
    } catch (err) {
      showError(err.message);
      creating = false;
      btn.textContent = 'Create Project';
      validateForm();
    }
  };

  function onProjectDone(data) {
    creating = false;
    var btn = $('createBtn');
    if (data.code === 0) {
      btn.textContent = 'Done!';
      $('successBanner').textContent = 'Project created at ' + data.projectPath;
      $('successBanner').classList.add('visible');
      projectPath = data.projectPath;
      fetchProjectPorts();
      showServerPanel();
    } else {
      btn.textContent = 'Create Project';
      showError('Process exited with code ' + data.code + '. Check the terminal output above.');
      validateForm();
    }
  }

  // -- Terminal --
  function appendTerminal(text) {
    var el = $('terminal');
    el.textContent += text;
    el.scrollTop = el.scrollHeight;
  }

  // -- Banners --
  function showError(msg) {
    var el = $('errorBanner');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // -- Server Panel --
  function showServerPanel() {
    $('serverPanel').classList.add('visible');
    $('urlPanel').classList.add('visible');
    // Determine which frameworks are included based on preset or custom selection
    var PRESET_HAS_ASTRO = ['full', 'marketing', 'both-frameworks', 'minimal'];
    var PRESET_HAS_NEXT = ['full', 'dashboard', 'both-frameworks', 'nextjs-minimal'];
    var showAstro = selectedPreset ? PRESET_HAS_ASTRO.indexOf(selectedPreset) >= 0 : selectedServices.has('astro');
    var showNext = selectedPreset ? PRESET_HAS_NEXT.indexOf(selectedPreset) >= 0 : selectedServices.has('nextjs');
    serverStates = {};
    var html = '';
    if (showAstro) {
      serverStates.astro = { status: 'stopped', port: null };
      html += serverRowHTML('astro', 'Astro');
    }
    if (showNext) {
      serverStates.next = { status: 'stopped', port: null };
      html += serverRowHTML('next', 'Next.js');
    }
    $('serverRows').innerHTML = html;
    $('serverRows').addEventListener('click', function(e) {
      var startBtn = e.target.closest('[data-start]');
      if (startBtn) { startServer(startBtn.getAttribute('data-start')); return; }
      var stopBtn = e.target.closest('[data-stop]');
      if (stopBtn) { stopServer(stopBtn.getAttribute('data-stop')); return; }
    });
    renderURLTable();
  }

  function serverRowHTML(id, name) {
    return '<div class="server-row" id="row-' + id + '">'
      + '<div class="status-dot" id="dot-' + id + '"></div>'
      + '<div class="server-name">' + esc(name) + '</div>'
      + '<div class="server-url" id="url-' + id + '"></div>'
      + '<div class="server-actions">'
      + '<button class="btn-outline btn-sm btn-start" id="startBtn-' + id + '" data-start="' + id + '">Start</button>'
      + '<button class="btn-outline btn-sm btn-stop" id="stopBtn-' + id + '" data-stop="' + id + '" style="display:none">Stop</button>'
      + '</div></div>';
  }

  window.startServer = async function(name) {
    serverStates[name] = { status: 'starting', port: null };
    updateServerUI(name);
    $('serverLogs').classList.add('visible');
    await fetch('/api/start-server', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ server: name, projectPath: projectPath }),
    });
  };

  window.stopServer = async function(name) {
    await fetch('/api/stop-server', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ server: name }),
    });
  };

  function onServerReady(server, port) {
    if (!serverStates[server]) return;
    serverStates[server] = { status: 'running', port: port };
    updateServerUI(server);
    renderURLTable();
  }

  function onServerStopped(server) {
    if (!serverStates[server]) return;
    serverStates[server] = { status: 'stopped', port: null };
    updateServerUI(server);
    renderURLTable();
  }

  function updateServerUI(name) {
    var state = serverStates[name];
    if (!state) return;
    var dot = $('dot-' + name);
    var urlEl = $('url-' + name);
    var startBtn = $('startBtn-' + name);
    var stopBtn = $('stopBtn-' + name);
    dot.className = 'status-dot ' + state.status;
    if (state.status === 'running' && state.port) {
      var a = document.createElement('a');
      a.href = 'http://localhost:' + state.port;
      a.target = '_blank';
      a.textContent = 'localhost:' + state.port;
      urlEl.textContent = '';
      urlEl.appendChild(a);
    } else if (state.status === 'starting') {
      urlEl.textContent = 'Starting...';
      urlEl.style.color = '#eab308';
    } else {
      urlEl.textContent = '';
      urlEl.style.color = '';
    }
    startBtn.style.display = state.status === 'stopped' ? '' : 'none';
    stopBtn.style.display = state.status !== 'stopped' ? '' : 'none';
  }

  function appendServerLog(server, text) {
    var el = $('serverLogs');
    el.textContent += '[' + server + '] ' + text;
    el.scrollTop = el.scrollHeight;
  }

  // -- Fetch project ports from .ports file --
  async function fetchProjectPorts() {
    if (!projectPath) return;
    try {
      var res = await fetch('/api/ports?path=' + encodeURIComponent(projectPath));
      if (res.ok) {
        projectPorts = await res.json();
        renderURLTable();
      }
    } catch(e) {}
  }

  // -- URL Table --
  function getSelectedServiceIds() {
    if (selectedPreset) {
      var PRESET_MAP = {
        'full': ['astro','nextjs','supabase','payload','twenty','sentry','posthog','resend'],
        'marketing': ['astro','supabase','sentry','posthog'],
        'dashboard': ['nextjs','payload','supabase','sentry'],
        'both-frameworks': ['astro','nextjs','supabase','sentry'],
        'minimal': ['astro'],
        'nextjs-minimal': ['nextjs'],
      };
      return PRESET_MAP[selectedPreset] || [];
    }
    return Array.from(selectedServices);
  }

  function renderURLTable() {
    var tbody = $('urlTableBody');
    tbody.textContent = '';
    var activeIds = getSelectedServiceIds();
    for (var i = 0; i < defaultServiceURLs.length; i++) {
      var svc = defaultServiceURLs[i];
      // Only show services that were selected
      if (svc.service && activeIds.indexOf(svc.service) === -1) continue;
      var state = svc.server ? serverStates[svc.server] : null;
      var running = state && state.status === 'running';
      // Get port: from running server, or from .ports file, or unknown
      var port = running && state.port ? state.port : (projectPorts[svc.portKey] || null);
      var tr = document.createElement('tr');
      var tdName = document.createElement('td');
      tdName.textContent = svc.name;
      var tdUrl = document.createElement('td');
      var tdStatus = document.createElement('td');
      if (port) {
        var url = 'http://localhost:' + port + (svc.suffix || '');
        if (running || !svc.server) {
          // Clickable link for running servers or Docker services (always running)
          var a = document.createElement('a');
          a.href = url;
          a.target = '_blank';
          a.textContent = url;
          tdUrl.appendChild(a);
        } else {
          tdUrl.style.color = '#52525b';
          tdUrl.textContent = url;
        }
      } else {
        tdUrl.style.color = '#52525b';
        tdUrl.textContent = 'Port not yet assigned';
      }
      var dot = document.createElement('span');
      dot.style.color = running ? '#22c55e' : (port && !svc.server ? '#22c55e' : '#3f3f46');
      dot.textContent = '\u25CF';
      tdStatus.appendChild(dot);
      tr.appendChild(tdName);
      tr.appendChild(tdUrl);
      tr.appendChild(tdStatus);
      tbody.appendChild(tr);
    }
  }

  // -- Boot --
  init();
})();
</script>
</body>
</html>
